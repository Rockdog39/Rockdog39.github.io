<!DOCTYPE html>
<html lang="en">
<head>
    <!--
    This page is a newsletter signup form, it contains some input fields for users 
    to enter their information and sign up to a newsletter.
    Rory Rock 26/5/2026.
    -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="css/portfolio_A3.css">
    <link rel="stylesheet" href="css/print.css" media="print">
    <link rel="icon" href="images/favicon_dark.png">
    <title>Newsletter Signup</title>
</head>

<body onload="newsletterWelcome();">
    <form 
        id="news-letter" 
        action="https://formspree.io/f/xykvzlpb" 
        method="post" 
        target="_blank"
    >
        <div class="nl-field">
            <label class="nl-label" for="first-name">First Name:</label>
            <input
                type="text" 
                name="first-name" 
                id="first-name" 
                placeholder="Enter your first name" 
                autofocus 
                maxlength="60"
            >
        </div>    
        <div class="nl-field">
            <label class="nl-label" for="last-name">Last Name:</label>
            <input 
                type="text" 
                name="last-name" 
                id="last-name" 
                placeholder="Enter your last name" 
                maxlength="60"
            >
        </div>
        <div class="nl-field">
            <label class="nl-label" for="email">Email:</label>
            <input 
                type="email" 
                name="email" 
                placeholder="Enter your email" 
                maxlength="60"
                required 
            >
        </div>    
        <div class="nl-field options">
            <fieldset>
            <legend class="nl-label">Age:</legend>
            <input 
                type="radio" 
                name="age" 
                value="15-25" 
                required>15-25
            <input 
                type="radio" 
                name="age" 
                value="26-35">26-35
            <input 
                type="radio" 
                name="age" 
                value="36-45">36-45
            <input 
                type="radio" 
                name="age" 
                value="55+">55+
            </fieldset>
        </div>
        <div class="nl-field options">
            <fieldset>
            <legend class="nl-label">Department:</legend>
            <input 
                type="checkbox" 
                name="department[]" 
                value="sales">Sales
            <input 
                type="checkbox" 
                name="department[]" 
                value="accounts">Accounts
            <input 
                type="checkbox" 
                name="department[]" 
                value="developers">Developers
            <input 
                type="checkbox" 
                name="department[]" 
                value="design">Design
            <input 
                type="checkbox" 
                name="department[]" 
                value="engineering">Engineering
            </fieldset>
        </div>    
        <div class="nl-field">    
            <label for="comments">Comments:</label>
            <textarea 
                name="comments" 
                cols="60" 
                rows="3">
            </textarea>
        </div>
        <div class="nl-field">
            <input 
                type="submit" 
                value="Submit" 
                onclick="return validateForm()"
            >
            <input 
                type="reset" 
                name="Reset"
            >
        </div>    
    </form>
<script src="js/rorys_first_JS.js"></script>
</body>
</html>
